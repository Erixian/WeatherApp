<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Now | Previsão do Tempo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <header>
            <h1><i class="fas fa-map-marker-alt"></i> Clima Now</h1>
            <p>Descubra o tempo em qualquer lugar do mundo</p>
        </header>

        <section class="search-section">
            <form id="weatherForm" th:action="@{/weather}" method="get" class="weather-form">
                <div class="input-group">
                    <input type="text" name="city" placeholder="Cidade (Ex: London)" required>
                </div>
                <div class="input-row">
                    <input type="text" name="stateCode" th:value="${stateCode != null ? stateCode : ''}" placeholder="UF">
                    <input type="text" name="countryCode" placeholder="País (Ex: GB)">
                </div>
                <input type="hidden" name="clientTzOffsetMinutes" id="clientTzOffsetMinutes" value="0" />
                <button type="submit" class="btn-search">BUSCAR CLIMA</button>
            </form>

            <div th:if="${errorMessage != null}" class="error-box">
                <p th:text="${errorMessage}">Cidade não encontrada</p>
            </div>
        </section>

        <!-- Resultado -->
        <div class="result-card" th:if="${weatherData != null}">
            <div class="result-header">
                <div class="location-data">
                    <h2 th:text="${coords.name + ', ' + weatherData.sys.country}">London, GB</h2>
                    <p class="date-today" id="current-date"></p>
                </div>
                <div class="main-temp">
                    <span th:text="${#numbers.formatDecimal(weatherData.main.temp, 1, 0)}">11</span>°C
                </div>
            </div>

            <div class="weather-condition">
                <div th:each="w : ${weatherData.weather}" class="condition-item">
                    <!-- Ícone com sombra via CSS -->
                    <img th:src="@{'http://openweathermap.org/img/wn/' + ${w.icon} + '@4x.png'}" class="weather-icon" alt="Weather Icon">
                    <p class="desc" th:text="${w.description}">Few Clouds</p>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-box">
                    <span>SENSAÇÃO</span>
                    <strong th:text="${weatherData.main.feelsLike + '°'}">9.52°</strong>
                </div>
                <div class="info-box">
                    <span>UMIDADE</span>
                    <strong th:text="${weatherData.main.humidity + '%'}">48%</strong>
                </div>
                <div class="info-box">
                    <span>MÍNIMA</span>
                    <strong th:text="${weatherData.main.tempMin + '°'}">10.36°</strong>
                </div>
                <div class="info-box">
                    <span>MÁXIMA</span>
                    <strong th:text="${weatherData.main.tempMax + '°'}">12.1°</strong>
                </div>
                <div class="info-box">
                    <span>NUVENS</span>
                    <strong th:text="${weatherData.clouds.all + '%'}">20%</strong>
                </div>
                <div class="info-box">
                    <span>NASCER DO SOL (GMT)</span>
                    <strong th:text="${sunriseGmt}">06:30 GMT</strong>
                </div>
                <div class="info-box">
                    <span>PÔR DO SOL (GMT)</span>
                    <strong th:text="${sunsetGmt}">18:20 GMT</strong>
                </div>
                <div class="info-box">
                    <span>LOCAL (Fuso)</span>
                    <strong th:text="${locationZone}">GMT+01:00</strong>
                </div>
                <div class="info-box">
                    <span>CLIENTE (Fuso)</span>
                    <strong th:text="${clientZone}">GMT-03:00</strong>
                </div>
                <div class="info-box">
                    <span>Diferença</span>
                    <strong th:text="${offsetDiff}">+4h</strong>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', { 
        weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' 
    });

    const tzElement = document.getElementById('clientTzOffsetMinutes');
    if (tzElement) {
        tzElement.value = new Date().getTimezoneOffset();
    }
</script>
</body>
</html>
